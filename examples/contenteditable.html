<!doctype html>
<html lang="th">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>EnonE Thai Thesaurus Demo</title>
  <link rel="stylesheet" href="../src/browser/style.css">
  <style>
    body { max-width: 760px; margin: 48px auto; padding: 0 20px; font: 18px/1.8 system-ui; }

<body>

  <script type="module">
    import { attachThaiThesaurus } from "../dist/src/browser/index.js";
